# urordo Automated Build & Release — GitHub Actions
#
# Triggers on pushing a tag (e.g. `git tag v0.1.0` && `git push origin v0.1.0`)
# It will draft a new GitHub Release with all the binaries and the update files safely.

name: Build and Release urordo

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-release-windows:
    name: Build & Release Windows Installer
    runs-on: windows-latest
    permissions:
      contents: write # Required for tauri-action to create GitHub releases

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust stable (x86_64-pc-windows-msvc)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      # Cache Rust dependencies — saves ~3-4 min on subsequent runs
      - name: Cache Rust build artifacts
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      # Execute tauri-action to build and upload release assets
      - name: Build and Release Tauri application
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          # TAURI_WINDOWS_CERTIFICATE_THUMBPRINT: ${{ secrets.TAURI_WINDOWS_CERTIFICATE_THUMBPRINT }}
        with:
          tagName: app-v__VERSION__ # Automatically uses the version from tauri.conf.json
          releaseName: 'urordo v__VERSION__'
          releaseBody: 'See the assets below to download the latest version of urordo.'
          releaseDraft: true
          prerelease: false
